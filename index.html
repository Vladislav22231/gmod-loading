.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: 1s;
    filter: brightness(0.7);
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;

}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
