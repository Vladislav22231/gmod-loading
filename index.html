<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PixelCanvas</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: 1s;
    filter: brightness(0.7);
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255,255,255,0.4);
    animation: glow 2s infinite alternate;
}

.info {
    margin-bottom: 10px;
    font-size: 18px;
}

.info a {
    color: #60a5fa;
    text-decoration: none;
}

.info a:hover {
    text-decoration: underline;
}

.serverInfo {
    margin-bottom: 15px;
    font-size: 16px;
    opacity: 0.9;
}

.progress-bar {
    width: 420px;
    height: 25px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    margin: auto;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    box-shadow: 0 0 15px #3b82f6;
    transition: 0.2s;
}

.percent {
    margin-top: 10px;
}

/* соцсети */
.socials {
    position: absolute;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
}

.socials a {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    text-decoration: none;
    color: white;
    border-radius: 10px;
    transition: 0.3s;
}

.socials a:hover {
    background: rgba(255,255,255,0.3);
    transform: translateX(5px);
}

.socials img {
    width: 20px;
}

/* анимация */
@keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,255,255,0.2); }
    to { text-shadow: 0 0 25px rgba(255,255,255,0.8); }
}
</style>

</head>

<script>
/* Фоны */
let images = ["Screenshot_83.png","Screenshot_84.png","Screenshot_85.png","Screenshot_87.png"];
let index = 0;
let bg = document.getElementById("bg");

function changeBG() {
    bg.style.backgroundImage = "url('" + images[index] + "')";
    index++;
    if(index >= images.length) index = 0;
}
setInterval(changeBG, 5000);
changeBG();

/* ПРОГРЕСС-БАР */
let percent = 0;
let bar = document.getElementById("bar");
let text = document.getElementById("percent");

function fakeLoad() {
    if(percent < 100){
        percent += Math.random() * 3;
        if(percent>100) percent=100;
        bar.style.width = percent + "%";
        text.innerText = Math.floor(percent) + "%";
        setTimeout(fakeLoad,120);
    }
}
fakeLoad();

/* ==== РЕАЛЬНЫЕ ДАННЫЕ GMod ==== */
function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
    document.getElementById("serverInfo").innerHTML =
        "🗺 Карта: " + mapname + "<br>" +
        "👥 Макс игроков: " + maxplayers + "<br>" +
        "🎮 Режим: " + gamemode;
}

function DownloadingFile(file) {
    document.getElementById("serverInfo").innerHTML =
        "📥 Загрузка: " + file;
}

function SetStatusChanged(status) {
    document.getElementById("serverInfo").innerHTML = status;
}
</script>
