<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PixelCanvas</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: 1s;
    filter: brightness(0.7);
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255,255,255,0.4);
    animation: glow 2s infinite alternate;
}

.info {
    margin-bottom: 10px;
    font-size: 18px;
}

.serverInfo {
    margin-bottom: 15px;
    font-size: 16px;
    opacity: 0.9;
}

.progress-bar {
    width: 420px;
    height: 25px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    margin: auto;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    box-shadow: 0 0 15px #3b82f6;
    transition: 0.2s;
}

.percent {
    margin-top: 10px;
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,255,255,0.2); }
    to { text-shadow: 0 0 25px rgba(255,255,255,0.8); }
}
</style>

</head>
<body>

<div class="background" id="bg"></div>
<div class="overlay"></div>

<div class="center">
    <h1>|PixelCanvas|Sandbox||UA||</h1>

    <div class="info">
        Пока ты ждешь загрузку, посмотри кадры нашего сервера 
    </div>

    <div class="serverInfo" id="serverInfo">
        Подключение к серверу...
    </div>

    <div class="progress-bar">
        <div class="progress" id="bar"></div>
    </div>

    <div class="percent" id="percent">0%</div>
</div>

<script>
// ===== СЛАЙД-ШОУ =====
let images = [
    "https://vladislav22231.github.io/gmod-loading/Screenshot_83.png",
    "https://vladislav22231.github.io/gmod-loading/Screenshot_84.png",
    "https://vladislav22231.github.io/gmod-loading/Screenshot_85.png",
    "https://vladislav22231.github.io/gmod-loading/Screenshot_87.png"
];

let index = 0;
let bg = document.getElementById("bg");

function changeBG() {
    bg.style.backgroundImage = "url('" + images[index] + "')";
    index = (index + 1) % images.length;
}

setInterval(changeBG, 5000);
changeBG();


// ====== РЕАЛЬНАЯ ЗАГРУЗКА GMod ======

let totalFiles = 0;
let neededFiles = 0;

// сколько всего файлов
function SetFilesTotal(total) {
    totalFiles = total;
}

// сколько осталось скачать
function SetFilesNeeded(needed) {
    neededFiles = needed;
}

// при скачивании файла
function DownloadingFile(file) {
    let downloaded = totalFiles - neededFiles;

    if (totalFiles > 0) {
        let percent = Math.floor((downloaded / totalFiles) * 100);

        document.getElementById("bar").style.width = percent + "%";
        document.getElementById("percent").innerText = percent + "%";

        document.getElementById("serverInfo").innerHTML =
            "📥 " + downloaded + "/" + totalFiles + "<br>" + file;
    } else {
        document.getElementById("serverInfo").innerHTML = "Подготовка загрузки...";
    }
}

// инфа о сервере
function GameDetails(servername, serverurl, mapname, maxplayers, steamid) {
    document.getElementById("serverInfo").innerHTML =
        "🗺 Карта: " + mapname + "<br>" +
        "👥 Макс игроков: " + maxplayers;
}

// статус
function SetStatusChanged(status) {
    document.getElementById("serverInfo").innerHTML = status;
}

// когда всё скачалось
function SetFilesDownloaded() {
    document.getElementById("bar").style.width = "100%";
    document.getElementById("percent").innerText = "100%";
    document.getElementById("serverInfo").innerHTML = "Загрузка завершена!";
}
</script>

</body>
</html>
